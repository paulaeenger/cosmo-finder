<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0a1226"/>
      <stop offset="100%" stop-color="#03050b"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8c474" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#e8c474" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e8c474" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background with rounded corners (iOS will mask this) -->
  <rect width="512" height="512" fill="url(#bg)" rx="96"/>
  <!-- Subtle starfield -->
  <g fill="white" opacity="0.45">
    <circle cx="78" cy="92" r="1.5"/>
    <circle cx="142" cy="58" r="1"/>
    <circle cx="412" cy="76" r="1.5"/>
    <circle cx="450" cy="138" r="1"/>
    <circle cx="76" cy="232" r="1"/>
    <circle cx="68" cy="380" r="1.5"/>
    <circle cx="160" cy="426" r="1"/>
    <circle cx="386" cy="408" r="1.5"/>
    <circle cx="448" cy="338" r="1"/>
    <circle cx="220" cy="92" r="1"/>
    <circle cx="320" cy="124" r="1"/>
    <circle cx="120" cy="316" r="1"/>
    <circle cx="392" cy="248" r="1"/>
  </g>
  <!-- Centered sparkle / 4-point star -->
  <g transform="translate(256, 256)">
    <!-- Halo -->
    <circle r="160" fill="url(#halo)"/>
    <!-- 4-point star (sparkle) -->
    <path
      d="M 0,-110 C 8,-32 32,-8 110,0 C 32,8 8,32 0,110 C -8,32 -32,8 -110,0 C -32,-8 -8,-32 0,-110 Z"
      fill="#e8c474"
    />
    <!-- Inner brightness -->
    <circle r="14" fill="#fff8e6"/>
  </g>
</svg>
